name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------
  # Build + test on stable across {Linux, macOS, Windows}, plus beta on
  # Linux as an early-warning for upcoming breaking changes.
  # ---------------------------------------------------------------------
  build:
    name: build / ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: beta
          - os: macos-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  # ---------------------------------------------------------------------
  # MSRV gate — pinned to Cargo.toml's [workspace.package].rust-version.
  # Hard-coded in name (not from env) because GitHub's job-name eval
  # context doesn't see workflow-level env in all runner versions.
  # ---------------------------------------------------------------------
  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Generate Cargo.lock under stable so the resolver picks
      # MSRV-compatible versions before pinning to 1.74. The lockfile is
      # not committed to the repo (criterion 0.8 needs Rust >= 1.88, so a
      # single committed lockfile can't satisfy both stable and MSRV
      # builds without --ignore-rust-version games). The MSRV job only
      # builds non-dev targets, so dev-only deps like criterion never
      # need to compile under 1.74.
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked

  # ---------------------------------------------------------------------
  # rustfmt — formatting check.
  #
  # TODO(0.71.0): set continue-on-error: false to make this a hard gate.
  # Currently soft because the v0.70.0 dep-bump cycle (prost 0.13→0.14,
  # criterion 0.5→0.8, etc.) landed under tight CI iteration with no
  # local rustfmt available, so several files have line-wrap drift that
  # wasn't reformatted before the release tag. Run `cargo fmt --all`
  # locally and fold the diff into a single follow-up commit.
  # ---------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ---------------------------------------------------------------------
  # clippy — lint gate. -D warnings means any new lint regression
  # blocks merge.
  # ---------------------------------------------------------------------
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  # ---------------------------------------------------------------------
  # Miri — undefined-behaviour detector. Runs on the codec crates
  # (where any new `unsafe` block lives). A Miri hit is the
  # rust-equivalent of an ASan/UBSan failure and blocks merge.
  # ---------------------------------------------------------------------
  miri:
    name: cargo miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: cargo miri test (codec crates)
        env:
          # Disable isolation so prost-build's tempdir + filesystem
          # ops don't trip Miri's strict isolation defaults.
          MIRIFLAGS: -Zmiri-disable-isolation
        run: |
          cargo miri test -p protowire-pb --lib
          cargo miri test -p protowire-envelope --lib

  # ---------------------------------------------------------------------
  # Adversarial decoder corpus — HARDENING.md conformance reference.
  # Runs the check-decode harness against the upstream corpus checked
  # out as a sibling.
  # ---------------------------------------------------------------------
  hardening:
    name: HARDENING.md corpus
    runs-on: ubuntu-latest
    steps:
      # The spec script (cross_security_check.sh) computes
      # SIBLING_DIR=parent_of_spec_checkout and then looks for
      # SIBLING_DIR/protowire-rust/crates/check-decode. So we have to
      # check both repos out as siblings, with this repo at the path
      # name `protowire-rust` and the spec repo as `protowire`.
      - uses: actions/checkout@v6
        with:
          path: protowire-rust

      - name: Checkout protowire (spec repo for adversarial corpus)
        uses: actions/checkout@v6
        with:
          repository: trendvidia/protowire
          path: protowire

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: protowire-rust

      - name: Run corpus
        # The script does its own `cargo build --release -p check-decode`
        # under $RUST_DIR, so no separate build step here.
        run: bash protowire/scripts/cross_security_check.sh
